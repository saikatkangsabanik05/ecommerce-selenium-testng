name: eCommerce Selenium TestNG CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run regression suite every day at 6 AM UTC
    - cron: '0 6 * * *'

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Run Smoke Tests
        run: mvn test -Dgroups=smoke -Dbrowser=chrome -Dheadless=true

      - name: Upload Smoke Test Reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: smoke-test-reports
          path: |
            reports/
            screenshots/

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Run Regression Tests
        run: mvn test -Dgroups=regression -Dbrowser=chrome -Dheadless=true

      - name: Upload Regression Test Reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: regression-test-reports
          path: |
            reports/
            screenshots/
