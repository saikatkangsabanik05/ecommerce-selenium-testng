# ===================================================
# eCommerce Test Automation - Configuration Properties
# ===================================================

# Application URL (using demo site)
base.url=https://www.saucedemo.com

# Browser Configuration (chrome | firefox | edge)
browser=chrome
headless=false

# Timeouts (in seconds)
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# Test Users
standard.user=standard_user
locked.user=locked_out_user
performance.user=performance_glitch_user
password=secret_sauce

# Test Data
test.email=testuser@ecommerce.com
test.firstname=John
test.lastname=Doe
test.zipcode=10001

# Screenshot
screenshot.on.failure=true
screenshot.path=screenshots/

# Reports
report.path=reports/
report.name=ECommerceTestReport

# Retry Count on Failure
retry.count=1
